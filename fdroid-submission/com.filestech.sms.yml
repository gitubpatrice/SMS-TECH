AutoName: SMS Tech

RepoType: git
Repo: https://github.com/gitubpatrice/SMS-TECH.git

# Reproducible build pinned to the upstream-signed GitHub release APKs.
# F-Droid will build from source at the exact commit hash below and verify the
# resulting APK byte-for-byte against the GitHub asset referenced in Binaries.
Binaries: https://github.com/gitubpatrice/SMS-TECH/releases/download/v%v/app-%a-release.apk

Builds:
  - versionName: 1.3.6
    versionCode: 36
    commit: af32bf7657b0157cc8b176e2f4f64085314d02fe
    subdir: app
    gradle:
      - yes
    rm:
      - app/lint-baseline.xml
    prebuild:
      - sed -i -e '/keystoreProps = Properties/,/}/d' build.gradle.kts
      - sed -i -e '/signingConfigs/,/}\s*$/d' build.gradle.kts
      - sed -i -e '/if (keystoreProps.isNotEmpty()) signingConfig/d' build.gradle.kts

# SHA-256 fingerprint of the upstream APK signing certificate. F-Droid uses this
# to verify that the reproducible build it produces matches the same signing key
# as the GitHub release — guaranteeing identical signature across both
# distribution channels (users can update freely between GH and F-Droid).
AllowedAPKSigningKeys: b09a951114908885aefe6144ac980975dd8bd889beb9e61676a5c2c8966c687d

AutoUpdateMode: Version
UpdateCheckMode: Tags
UpdateCheckData: 'app/build.gradle.kts|versionName\s*=\s*"(.*?)"|.|versionCode\s*=\s*(\d+)'
CurrentVersion: 1.3.6
CurrentVersionCode: 36
