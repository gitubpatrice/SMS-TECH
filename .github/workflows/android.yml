name: Android CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Ktlint stays non-blocking on purpose: it reports pure formatting nits with no defensive
      # value, and `ignoreFailures` is already set in build.gradle.kts.
      - name: Ktlint (non-blocking)
        run: ./gradlew ktlintCheck --no-daemon || echo "ktlint warnings — non-blocking"

      # v1.24.0 — detekt et lint sont désormais BLOQUANTS. La dette historique est absorbée par
      # `app/detekt-baseline.xml` (1 153 issues) et `app/lint-baseline.xml` (45 erreurs,
      # 202 warnings) : seules les violations NOUVELLES font échouer le build. Ne jamais
      # régénérer une baseline pour faire taire un problème introduit par un changement.
      - name: Detekt
        run: ./gradlew detekt --no-daemon

      - name: Lint
        run: ./gradlew lintDebug --no-daemon

      - name: Unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

      # Le filet instrumenté (tests de migration Room sur le chemin SQLCipher réel + preuve du
      # correctif SEC-CRIT de la clé nulle) doit au minimum compiler à chaque push. L'exécution
      # sur émulateur est un job séparé — `connectedAndroidTest` EFFACE les données de l'appareil
      # et ne doit jamais tourner ailleurs que sur un émulateur jetable.
      - name: Compile instrumented tests
        run: ./gradlew assembleDebugAndroidTest --no-daemon

      - name: Assemble debug
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: smstech-debug-apks
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

  instrumented:
    name: Instrumented tests (emulator)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Room migration tests + the SEC-CRIT zero-key rekey proof need the real SQLCipher native
      # library, so they can only run on a device. This emulator is disposable — the same command
      # must NEVER be pointed at a personal handset: `connectedAndroidTest` wipes app data.
      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          target: default
          disable-animations: true
          script: ./gradlew :app:connectedDebugAndroidTest --no-daemon

      - name: Upload instrumentation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smstech-instrumented-report
          path: app/build/reports/androidTests/connected/**
          if-no-files-found: warn
