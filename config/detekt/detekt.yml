build:
  maxIssues: 0
  excludeCorrectable: false

config:
  validation: true
  warningsAsErrors: false

processors:
  active: true

console-reports:
  active: true

comments:
  active: true
  UndocumentedPublicClass:
    active: false
  UndocumentedPublicFunction:
    active: false
  UndocumentedPublicProperty:
    active: false

complexity:
  active: true
  # Compose composables routinely exceed the JVM-Kotlin "tasteful" thresholds because the
  # UI tree is declarative and lambdas-for-everything is the idiom. The thresholds below are
  # aligned with what Now-In-Android, Tivi, and the Material 3 sample apps tolerate.
  LongMethod:
    active: true
    threshold: 300
  LongParameterList:
    active: true
    functionThreshold: 20
    constructorThreshold: 20
  CyclomaticComplexMethod:
    active: true
    threshold: 40
  TooManyFunctions:
    active: true
    thresholdInClasses: 35
    thresholdInFiles: 35
    thresholdInInterfaces: 20
    thresholdInObjects: 20
  NestedBlockDepth:
    active: true
    threshold: 8

empty-blocks:
  active: true
  EmptyFunctionBlock:
    active: true
    ignoreOverridden: true

exceptions:
  active: true
  TooGenericExceptionCaught:
    active: false

naming:
  active: true
  FunctionNaming:
    functionPattern: '[a-zA-Z][a-zA-Z0-9_]*'
  ClassNaming:
    active: true
  TopLevelPropertyNaming:
    active: true
    constantPattern: '[A-Z][_A-Z0-9]*'
    propertyPattern: '[A-Za-z][_A-Za-z0-9]*'
    privatePropertyPattern: '_?[A-Za-z][_A-Za-z0-9]*'

performance:
  active: true

potential-bugs:
  active: true
  UnreachableCode:
    active: true

style:
  active: true
  MagicNumber:
    active: false
  MaxLineLength:
    active: true
    maxLineLength: 140
  WildcardImport:
    active: true
  ReturnCount:
    active: true
    max: 4
  UnusedPrivateMember:
    active: true
  UnusedImports:
    active: true

formatting:
  active: true
  android: true
  autoCorrect: false
  MaximumLineLength:
    active: false
