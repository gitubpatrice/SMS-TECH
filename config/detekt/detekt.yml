build:
  maxIssues: 0
  excludeCorrectable: false

config:
  validation: true
  warningsAsErrors: false

processors:
  active: true

console-reports:
  active: true

comments:
  active: true
  UndocumentedPublicClass:
    active: false
  UndocumentedPublicFunction:
    active: false
  UndocumentedPublicProperty:
    active: false

complexity:
  active: true
  LongMethod:
    active: true
    threshold: 80
  LongParameterList:
    active: true
    functionThreshold: 7
    constructorThreshold: 8
  CyclomaticComplexMethod:
    active: true
    threshold: 18
  TooManyFunctions:
    active: true
    thresholdInClasses: 25
    thresholdInFiles: 25
    thresholdInInterfaces: 15
    thresholdInObjects: 15
  NestedBlockDepth:
    active: true
    threshold: 5

empty-blocks:
  active: true
  EmptyFunctionBlock:
    active: true
    ignoreOverridden: true

exceptions:
  active: true
  TooGenericExceptionCaught:
    active: false

naming:
  active: true
  FunctionNaming:
    functionPattern: '[a-zA-Z][a-zA-Z0-9_]*'
  ClassNaming:
    active: true
  TopLevelPropertyNaming:
    active: true
    constantPattern: '[A-Z][_A-Z0-9]*'
    propertyPattern: '[A-Za-z][_A-Za-z0-9]*'
    privatePropertyPattern: '_?[A-Za-z][_A-Za-z0-9]*'

performance:
  active: true

potential-bugs:
  active: true
  UnreachableCode:
    active: true

style:
  active: true
  MagicNumber:
    active: false
  MaxLineLength:
    active: true
    maxLineLength: 140
  WildcardImport:
    active: true
  ReturnCount:
    active: true
    max: 4
  UnusedPrivateMember:
    active: true
  UnusedImports:
    active: true

formatting:
  active: true
  android: true
  autoCorrect: false
  MaximumLineLength:
    active: false
